version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trte
      POSTGRES_PASSWORD: trte
      POSTGRES_DB: trte
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trte"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./worker
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./api/db.py:/app/db.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ui:
    build: ./ui
    ports:
      - "8501:8501"
    environment:
      - TRTE_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
